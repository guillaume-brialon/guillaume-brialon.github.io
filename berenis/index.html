<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feuille de Route Berenis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #ffffff;
            --accent-color: #000091;
            --secondary-color: #123765;
            --success-color: #5b8c5a;
            --progress-color: #ea580c;
            --text-color: #1e1e1e;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --line-width: 4px;
            --marker-size: 24px;
            --marker-border: 4px;
            --content-left: 80px;
            --line-center: 40px;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            font-family: 'Raleway', system-ui, -apple-system, sans-serif;
            font-size: 16px;
            color: var(--text-color);
            font-variant-numeric: lining-nums;
        }

        .header {
            padding: 60px 40px 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 40px 60px;
            position: relative;
        }

        /* Ligne verticale de la timeline */
        .timeline {
            position: relative;
            padding-left: var(--content-left);
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: calc(var(--line-center) - var(--line-width) / 2);
            top: 0;
            bottom: 0;
            width: var(--line-width);
            background: var(--accent-color);
            border-radius: 2px;
        }

        .milestone-block {
            position: relative;
            display: flex;
            margin-bottom: 50px;
        }

        .milestone-block:last-child {
            margin-bottom: 0;
        }

        .milestone-marker {
            position: absolute;
            left: calc(-1 * var(--content-left) + var(--line-center) - var(--marker-size) / 2 - var(--marker-border));
            width: calc(var(--marker-size) + 2 * var(--marker-border));
            height: calc(var(--marker-size) + 2 * var(--marker-border));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Marqueur cercle évidé (jalon non courant) */
        .marker.hollow {
            width: var(--marker-size);
            height: var(--marker-size);
            border-radius: 50%;
            background-color: var(--bg-color);
            border: var(--marker-border) solid var(--accent-color);
            position: relative;
        }

        /* Marqueur disque plein (jalon courant) */
        .marker.filled {
            width: calc(var(--marker-size) + 2 * var(--marker-border));
            height: calc(var(--marker-size) + 2 * var(--marker-border));
            border-radius: 50%;
            background-color: var(--accent-color);
        }

        /* Jalons passés */
        .milestone-block.past .marker.hollow {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        .milestone-content {
            flex: 1;
            background: var(--bg-color);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .milestone-block.current .milestone-content {
            border-color: var(--accent-color);
            border-width: 2px;
        }

        .milestone-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .milestone-progress-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--progress-color);
            background: rgba(255, 149, 0, 0.1);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .milestone-complete-label {
            font-size: 1rem;
            color: var(--success-color);
        }

        .steps-list {
            list-style: none;
        }

        .steps-list li {
            margin-bottom: 10px;
        }

        .steps-list li:last-child {
            margin-bottom: 0;
        }

        .steps-list label {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: default;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Checkbox personnalisée avec progression */
        .step-checkbox {
            width: 18px;
            height: 18px;
            min-width: 18px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            background: transparent;
            margin-top: 2px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .step-checkbox.complete {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        .step-checkbox.in-progress {
            border-color: var(--progress-color);
        }

        .step-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--progress);
            background-color: var(--progress-color);
            opacity: 0.3;
        }

        .step-checkbox .checkmark {
            color: white;
            font-size: 12px;
            font-weight: bold;
            z-index: 1;
        }

        .steps-list span {
            color: var(--text-color);
        }

        .steps-list span.complete {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .progress-label {
            font-size: 0.8rem;
            color: var(--progress-color);
            font-weight: 600;
            margin-left: auto;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }
    
            .container {
                padding: 20px;
            }
    
            :root {
                --content-left: 60px;
                --line-center: 30px;
            }

            .milestone-content {
                padding: 16px;
            }

            .milestone-title {
                font-size: 1.1rem;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
